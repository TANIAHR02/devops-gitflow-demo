version: "3.9"

services:
  # ── Microservicio principal ───────────────────────────────────────
  usuarios-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: microservicio-usuarios
    image: microservicio-usuarios:latest
    ports:
      - "8000:8000"
    environment:
      - APP_ENV=production
      - APP_PORT=8000
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    volumes:
      - app-data:/app/data
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 256M
        reservations:
          cpus: "0.25"
          memory: 128M
    networks:
      - devops-network
    labels:
      - "com.devops.service=usuarios-api"
      - "com.devops.version=1.0.0"
      - "com.devops.team=DOY0101"

  # ── Servicio de pruebas (solo en CI/testing) ─────────────────────
  test-runner:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: test-runner
    command: ["pytest", "tests/", "-v", "--tb=short"]
    environment:
      - APP_ENV=testing
    volumes:
      - app-data:/app/data
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 128M
        reservations:
          cpus: "0.10"
          memory: 64M
    networks:
      - devops-network
    profiles:
      - testing

# ── Volúmenes ──────────────────────────────────────────────────────
volumes:
  app-data:
    driver: local

# ── Redes ─────────────────────────────────────────────────────────
networks:
  devops-network:
    driver: bridge
    name: devops-network
