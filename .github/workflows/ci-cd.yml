name: CI/CD Pipeline — EP2 DevOps

# ── Triggers ───────────────────────────────────────────────────────
on:
  push:
    branches:
      - develop
  pull_request:
    branches:
      - main

jobs:
  # ══════════════════════════════════════════════════════════════════
  # JOB 1: Pruebas unitarias con pytest
  # IE2: Integra pruebas automatizadas en el pipeline
  # ══════════════════════════════════════════════════════════════════
  test:
    name: "🧪 Pruebas Unitarias (pytest)"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      - name: Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov flake8

      - name: Linting con flake8
        run: |
          flake8 . --max-line-length=100 --exclude=__pycache__,venv,.git

      - name: Ejecutar tests con cobertura
        run: |
          pytest tests/ -v --tb=short --cov=. --cov-report=term-missing

  # ══════════════════════════════════════════════════════════════════
  # JOB 2: Análisis de seguridad con Snyk
  # IE3: Ajusta parámetros de seguridad en el pipeline
  # ══════════════════════════════════════════════════════════════════
  security:
    name: "🔒 Análisis de Seguridad (Snyk)"
    runs-on: ubuntu-latest
    needs: test    # Solo corre si los tests pasan

    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      - name: Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Escaneo de vulnerabilidades con Snyk
        uses: snyk/actions/python@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=high --file=requirements.txt
        # BLOQUEO: si Snyk detecta vulnerabilidades HIGH o CRITICAL,
        # el pipeline falla aquí y no continúa al build de Docker

      - name: Subir reporte Snyk como artefacto
        if: always()    # Guardar reporte incluso si falla
        uses: actions/upload-artifact@v4
        with:
          name: snyk-security-report
          path: snyk-report.json
          retention-days: 30

  # ══════════════════════════════════════════════════════════════════
  # JOB 3: Build de imagen Docker
  # IE1: Incorpora contenedores en el pipeline
  # ══════════════════════════════════════════════════════════════════
  build:
    name: "🐳 Build Imagen Docker"
    runs-on: ubuntu-latest
    needs: security    # Solo corre si la seguridad pasa

    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      - name: Configurar Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Construir imagen Docker
        run: |
          docker build \
            --tag microservicio-usuarios:${{ github.sha }} \
            --tag microservicio-usuarios:latest \
            --file Dockerfile \
            .

      - name: Verificar imagen construida
        run: |
          docker images microservicio-usuarios
          docker inspect microservicio-usuarios:latest

      - name: Exportar imagen como artefacto
        run: |
          docker save microservicio-usuarios:latest | gzip > imagen-docker.tar.gz

      - name: Subir imagen como artefacto
        uses: actions/upload-artifact@v4
        with:
          name: docker-image
          path: imagen-docker.tar.gz
          retention-days: 7

  # ══════════════════════════════════════════════════════════════════
  # JOB 4: Despliegue en entorno simulado con Docker Compose
  # IE4: Despliegue automático con trazabilidad
  # IE5: Orquestación de contenedores con Docker Compose
  # ══════════════════════════════════════════════════════════════════
  deploy:
    name: "🚀 Deploy en Entorno Simulado (Docker Compose)"
    runs-on: ubuntu-latest
    needs: build    # Solo corre si el build pasa

    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      - name: Configurar Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Desplegar con Docker Compose
        run: |
          docker compose up -d --build usuarios-api
          echo "Esperando que el servicio esté listo..."
          sleep 15

      - name: Verificar estado del contenedor (Health Check)
        run: |
          docker compose ps
          docker compose logs usuarios-api

      - name: Verificar endpoint de salud
        run: |
          curl --retry 5 --retry-delay 3 --retry-connrefused \
            http://localhost:8000/health || \
            (echo "❌ El servicio no respondió" && exit 1)

      - name: Prueba de humo — verificar endpoint principal
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8000/users)
          if [ "$STATUS" = "200" ]; then
            echo "✅ Endpoint /users responde correctamente (HTTP $STATUS)"
          else
            echo "❌ Endpoint /users falló (HTTP $STATUS)"
            exit 1
          fi

      - name: Resumen de trazabilidad del despliegue
        if: always()
        run: |
          echo "══════════════════════════════════════"
          echo "  TRAZABILIDAD DEL PIPELINE"
          echo "══════════════════════════════════════"
          echo "  Repo     : ${{ github.repository }}"
          echo "  Commit   : ${{ github.sha }}"
          echo "  Branch   : ${{ github.ref_name }}"
          echo "  Actor    : ${{ github.actor }}"
          echo "  Fecha    : $(date '+%Y-%m-%d %H:%M:%S UTC')"
          echo "  Job      : ${{ github.run_id }}"
          echo "══════════════════════════════════════"

      - name: Apagar entorno simulado
        if: always()
        run: |
          docker compose down
